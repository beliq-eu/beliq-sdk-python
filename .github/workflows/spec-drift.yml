name: Spec drift

# Catches the vendored openapi.json falling behind the deployed API. A red run
# means: run `python scripts/sync_spec.py` and open a PR.
on:
  schedule:
    - cron: '17 6 * * 1' # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/check_live_drift.py
